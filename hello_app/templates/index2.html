{% extends "index.html" %}
{% block content %}
<main class="main-content">
    <div class="container">
        <nav class="breadcrumbs">
            <a href="{% url 'main' %}">Главная</a>
            <span>→</span>
            <span>Автомобили</span>
        </nav>

        <section class="page-header">
            <h1 class="page-title" id="pageTitle">Каталог автомобилей</h1>
            <p class="page-subtitle">Большой выбор новых и подержанных автомобилей</p>
        </section>
        <section class="filters-section">
            <div class="filters-header">
                <h2>Фильтры</h2>
                <button class="reset-filters" onclick="resetAllFilters()">Сбросить все фильтры</button>
            </div>
            
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="car-brand">Марка</label>
                    <select id="car-brand" class="filter-select">
                        <option value="">Все марки</option>
                        {% for brand in brands %}
                        <option value="{{ brand }}">{{ brand }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Цена, ₽</label>
                    <div class="price-inputs">
                        <input type="number" id="min-price" placeholder="от" class="filter-input" min="0">
                        <input type="number" id="max-price" placeholder="до" class="filter-input" min="0">
                    </div>
                </div>
                
                <div class="filter-group">
                    <label for="car-year">Год</label>
                    <select id="car-year" class="filter-select">
                        <option value="">Любой</option>
                        {% for year in years %}
                        <option value="{{ year }}">{{ year }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="car-category">Категория</label>
                    <select id="car-category" class="filter-select">
                        <option value="">Все</option>
                        {% for category in categories %}
                        <option value="{{ category.name }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="filter-actions">
                <button class="filter-btn primary" onclick="applyFilters()">Применить фильтры</button>
                <button class="filter-btn secondary" onclick="resetAllFilters()">Сбросить все</button>
            </div>
        </section>

        <section class="results-section">
            <div class="results-info">
                <div class="results-count" id="resultsCount">Найдено автомобилей: <span>0</span></div>
            </div>
            <div class="cars-grid extended" id="carsContainer">
                <div style="text-align: center; padding: 40px;">Загрузка...</div>
            </div>
        </section>
    </div>
</main>
{% endblock %}
